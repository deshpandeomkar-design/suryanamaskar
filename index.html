<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Surya Namaskar Tracker</title>
    <!-- Ultra-reliable Direct MediaPipe Pose Libraries -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .video-box { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; line-height: 0; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #counter { font-size: 56px; font-weight: 800; color: #007bff; margin: 5px 0; }
        #status { font-size: 16px; color: #495057; font-weight: 500; min-height: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="margin-top:0; color:#333;">AI Surya Namaskar Counter</h3>
    
    <select id="userSelect">
        <option value="Player 1">Player 1</option>
        <option value="Player 2">Player 2</option>
        <option value="Player 3">Player 3</option>
    </select>

    <div class="video-box">
        <video id="webcam" playsinline muted></video>
        <canvas id="output"></canvas>
    </div>

    <div id="counter">0</div>
    <div id="status">Starting camera application...</div>
    <button id="sendBtn" disabled>Submit Workout</button>
</div>

<script>
    // PASTE YOUR MAKE.COM WEBHOOK URL BETWEEN THE QUOTES BELOW:
    const MAKE_WEBHOOK_URL = "3xhk8jfx4r2mnq2o9a4vgolcvx2nwjq2@hook.eu1.make.com";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output');
    const ctx = canvas.getContext('2d');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');
    const userSelect = document.getElementById('userSelect');

    let count = 0;
    let stage = "standing";

    // 1. Initialize Pure MediaPipe Pose
    const pose = new Pose({
        locateFile: (file) => `https://jsdelivr.net{file}`
    });

    pose.setOptions({
        modelComplexity: 0, // 0 = Light speed tracking optimized specifically for mobile chips
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // 2. Continuous AI Calculations
    pose.onResults((results) => {
        // Clear canvas overlay
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Match canvas dimensions to the running stream size dynamically
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            statusDiv.innerText = "AI Active! Step back to begin.";
            sendBtn.disabled = false;
        }

        if (results.poseLandmarks) {
            const landmarks = results.poseLandmarks;
            
            // Extract core coordinates (Nose = 0, Left Hip = 24, Right Hip = 23)
            const nose = landmarks[0];
            const leftHip = landmarks[24];
            const rightHip = landmarks[23];
            const hip = (leftHip && leftHip.visibility > 0.5) ? leftHip : rightHip;

            if (nose && hip && nose.visibility > 0.5 && hip.visibility > 0.5) {
                // Calculate relative vertical displacement proportional to frame height
                const verticalDistance = Math.abs(hip.y - nose.y);

                // Tracking Sequence States
                if (verticalDistance < 0.18 && stage === "standing") {
                    stage = "bending";
                    statusDiv.innerText = "Down Position Detected! Now stand straight.";
                    statusDiv.style.color = "#d39e00";
                }
                
                if (verticalDistance > 0.32 && stage === "bending") {
                    stage = "standing";
                    count++;
                    counterDiv.innerText = count;
                    statusDiv.innerText = "Round Tracked! Keep it up.";
                    statusDiv.style.color = "#28a745";
                }
            }

            // Draw tracking indicator dots on screen
            results.poseLandmarks.forEach(lm => {
                if (lm.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.arc(lm.x * canvas.width, lm.y * canvas.height, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = "#00ff00";
                    ctx.fill();
                }
            });
        }
    });

    // 3. Native Camera Control
    const camera = new Camera(video, {
        onFrame: async () => {
            await pose.send({ image: video });
        },
        width: 640,
        height: 480
    });
    
    statusDiv.innerText = "Initializing direct camera stream...";
    camera.start().catch(err => {
        statusDiv.innerText = "Camera error. Grant permissions and refresh.";
    });

    // 4. Webhook Trigger
    sendBtn.addEventListener('click', async () => {
        if(count === 0) { alert("Complete a round first!"); return; }
        sendBtn.disabled = true;
        statusDiv.innerText = "Saving data package...";
        try {
            await fetch(MAKE_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: userSelect.value,
                    reps: count,
                    timestamp: new Date().toISOString()
                })
            });
            alert("Score successfully synced!");
            count = 0;
            counterDiv.innerText = count;
            statusDiv.innerText = "Ready for next person.";
            statusDiv.style.color = "#495057";
        } catch (err) {
            alert("Database synchronization failed.");
        }
        sendBtn.disabled = false;
    });
</script>
</body>
</html>
