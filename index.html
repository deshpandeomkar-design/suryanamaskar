<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Surya Namaskar Counter</title>
    <!-- Working TensorFlow/MoveNet CDN Architecture -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f4f6f9; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .box { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #counter { font-size: 52px; font-weight: bold; color: #007bff; margin: 10px 0; }
        #status { font-size: 16px; color: #555; font-style: italic; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Surya Namaskar Counter</h2>
    
    <select id="userSelect">
        <option value="Player 1">Player 1</option>
        <option value="Player 2">Player 2</option>
        <option value="Player 3">Player 3</option>
    </select>

    <div class="box">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
    </div>

    <div id="counter">0</div>
    <div id="status">Starting Core Stream...</div>
    <button id="sendBtn" disabled>Submit Workout</button>
</div>

<script>
    // PASTE YOUR MAKE.COM WEBHOOK URL BETWEEN THE QUOTES BELOW:
    const MAKE_WEBHOOK_URL = "3xhk8jfx4r2mnq2o9a4vgolcvx2nwjq2@hook.eu1.make.com";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output');
    const ctx = canvas.getContext('2d');
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');
    const userSelect = document.getElementById('userSelect');

    let detector;
    let count = 0;
    let stage = "standing";

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: 640, height: 480 }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => { video.onloadedmetadata = () => { resolve(video); }; });
    }

    async function loadModel() {
        try {
            statusDiv.innerText = "Opening working lens stream...";
            await setupCamera();
            video.play();
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            statusDiv.innerText = "Connecting AI matrix...";
            
            // Reverting to the functional model structure with speed flags
            detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, {
                modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
            });
            
            statusDiv.innerText = "AI Active! Step back into frame.";
            sendBtn.disabled = false;
            detectPose();
        } catch (err) {
            statusDiv.innerText = "Initialization error. Please reload.";
            console.error(err);
        }
    }

    async function detectPose() {
        if (!detector) return;
        
        let poses = [];
        try {
            poses = await detector.estimatePoses(video);
        } catch (e) {
            // Soft fail fallback loop if a frame drops
            requestAnimationFrame(detectPose);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (poses && poses.length > 0) {
            const keypoints = poses[0].keypoints;
            
            const nose = keypoints.find(k => k.name === 'nose');
            const leftHip = keypoints.find(k => k.name === 'left_hip');
            const rightHip = keypoints.find(k => k.name === 'right_hip');
            const hip = (leftHip && leftHip.score > 0.25) ? leftHip : rightHip;

            if (nose && hip && nose.score > 0.25 && hip.score > 0.25) {
                const verticalDistance = Math.abs(hip.y - nose.y);

                // High-sensitivity thresholds to guarantee counting registers on vertical planes
                if (verticalDistance < 90 && stage === "standing") {
                    stage = "bending";
                    statusDiv.innerText = "Position: Bending Down";
                }
                
                if (verticalDistance > 135 && stage === "bending") {
                    stage = "standing";
                    count++;
                    counterDiv.innerText = count;
                    statusDiv.innerText = "Round Counted successfully!";
                }
            }

            // Green feedback overlay points
            keypoints.forEach(kp => {
                if (kp.score > 0.3) {
                    ctx.beginPath();
                    ctx.arc(canvas.width - kp.x, kp.y, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = "#00ff00";
                    ctx.fill();
                }
            });
        }
        requestAnimationFrame(detectPose);
    }

    sendBtn.addEventListener('click', async () => {
        if(count === 0) { alert("Do at least 1 rep first!"); return; }
        sendBtn.disabled = true;
        statusDiv.innerText = "Syncing to Leaderboard...";
        try {
            await fetch(MAKE_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: userSelect.value,
                    reps: count,
                    timestamp: new Date().toISOString()
                })
            });
            alert("Score saved successfully!");
            count = 0;
            counterDiv.innerText = count;
            statusDiv.innerText = "Ready for next person.";
        } catch (err) {
            alert("Sync error. Try again.");
        }
        sendBtn.disabled = false;
    });

    loadModel();
</script>
</body>
</html>
