<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surya Namaskar Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 30px auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-top: 0; margin-bottom: 20px; font-size: 24px; }
        label { font-weight: 600; color: #495057; display: block; margin-bottom: 8px; text-align: left; }
        select { width: 100%; padding: 14px; margin-bottom: 25px; border-radius: 8px; border: 1px solid #ced4da; font-size: 16px; background-color: #fff; box-sizing: border-box; }
        .counter-box { background: #e7f1ff; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        #counter { font-size: 72px; font-weight: 800; color: #007bff; margin: 10px 0; line-height: 1; }
        .btn-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-circle { flex: 1; padding: 18px; font-size: 28px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: background 0.2s; }
        .btn-minus { background: #dc3545; }
        .btn-minus:active { background: #bd2130; }
        .btn-plus { background: #007bff; }
        .btn-plus:active { background: #0062cc; }
        .btn-submit { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; box-sizing: border-box; }
        .btn-submit:active { background: #218838; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 14px; color: #6c757d; margin-top: 15px; min-height: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧘 Surya Namaskar Tracker</h2>
    
    <label for="userSelect">Who is practicing?</label>
    <select id="userSelect">
        <!-- ADD YOUR TEAM NAMES HERE -->
        <option value="Player 1">Player 1</option>
        <option value="Player 2">Player 2</option>
        <option value="Player 3">Player 3</option>
        <option value="Player 4">Player 4</option>
    </select>

    <div class="counter-box">
        <label style="text-align: center; margin: 0; color: #6c757d;">Current Count</label>
        <div id="counter">0</div>
    </div>

    <div class="btn-row">
        <button class="btn-circle btn-minus" onclick="changeCount(-1)">−</button>
        <button class="btn-circle btn-plus" onclick="changeCount(1)">+</button>
    </div>

    <button id="sendBtn" class="btn-submit" onclick="submitData()">Submit to Leaderboard</button>
    <div id="status">Ready to log workout.</div>
</div>

<script>
    // PASTE YOUR MAKE.COM WEBHOOK URL BETWEEN THE QUOTES BELOW:
    const MAKE_WEBHOOK_URL = "3xhk8jfx4r2mnq2o9a4vgolcvx2nwjq2@hook.eu1.make.com";

    let count = 0;
    const counterDiv = document.getElementById('counter');
    const statusDiv = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');
    const userSelect = document.getElementById('userSelect');

    function changeCount(val) {
        count += val;
        if (count < 0) count = 0; // Prevent negative counts
        counterDiv.innerText = count;
        
        // Haptic vibration feedback on mobile phones when clicking buttons
        if (navigator.vibrate) {
            navigator.vibrate(30);
        }
    }

    async function submitData() {
        if (count === 0) { 
            alert("Please add at least 1 rep before submitting!"); 
            return; 
        }
        
        sendBtn.disabled = true;
        statusDiv.innerText = "Sending workout details to database...";

        try {
            const response = await fetch(MAKE_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: userSelect.value,
                    reps: count,
                    timestamp: new Date().toISOString()
                })
            });

            if(response.ok) {
                alert(`Success! Logged ${count} rounds for ${userSelect.value}.`);
                count = 0;
                counterDiv.innerText = count;
                statusDiv.innerText = "Score saved! Ready for next entry.";
            } else {
                throw new Error("Server error");
            }
        } catch (err) {
            alert("Network error. Your spreadsheet might be full or offline.");
            statusDiv.innerText = "Error. Please try submitting again.";
        }
        sendBtn.disabled = false;
    }
</script>
</body>
</html>
